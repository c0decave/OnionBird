<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" role="img" aria-label="Onion study — red/purple">
  <title>Onion Study — Red Onion (Tor-friendly violet)</title>
  <defs>
    <radialGradient id="r-bulb" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#E6B4D9"/>
      <stop offset="22%" stop-color="#9B58A8"/>
      <stop offset="55%" stop-color="#5C2A6E"/>
      <stop offset="100%" stop-color="#26102E"/>
    </radialGradient>
    <linearGradient id="r-stalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2F1A0B"/>
      <stop offset="100%" stop-color="#7E5824"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="120" cy="248" rx="78" ry="6" fill="#000" opacity="0.30"/>

  <!-- roots -->
  <g stroke="#3E2010" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 95 240 Q 88 258, 80 274"/>
    <path d="M 105 244 Q 102 264, 99 282"/>
    <path d="M 115 245 Q 116 268, 116 286"/>
    <path d="M 125 244 Q 130 264, 134 282"/>
    <path d="M 135 240 Q 144 258, 152 272"/>
    <path d="M 88 236 Q 75 248, 64 260"/>
    <path d="M 142 236 Q 155 250, 166 264"/>
  </g>

  <!-- bulb body -->
  <path d="M 38 145
           C 38 82, 75 60, 120 55
           C 165 60, 202 82, 202 145
           C 202 220, 170 245, 120 245
           C 70 245, 38 220, 38 145 Z"
        fill="url(#r-bulb)"/>

  <!-- skin stripes -->
  <g fill="none" stroke="#1E0A28" stroke-width="1" stroke-linecap="round" opacity="0.55">
    <path d="M 120 58 C 88 75, 58 108, 50 150 C 58 210, 90 240, 118 244"/>
    <path d="M 120 58 C 100 78, 78 112, 70 152 C 76 215, 102 242, 122 244"/>
    <path d="M 120 58 C 130 80, 132 116, 132 158 C 130 218, 122 240, 120 244"/>
    <path d="M 120 58 C 145 80, 168 114, 178 152 C 172 212, 148 240, 124 244"/>
    <path d="M 120 58 C 155 78, 184 108, 192 150 C 184 210, 154 240, 126 244"/>
  </g>

  <!-- specular highlight -->
  <ellipse cx="78" cy="120" rx="22" ry="46" fill="#F2D5EA" opacity="0.45" transform="rotate(-14 78 120)"/>
  <ellipse cx="68" cy="155" rx="6" ry="14" fill="#FFFFFF" opacity="0.55"/>

  <!-- dry stalk -->
  <path d="M 118 56 C 114 42, 118 26, 114 14 C 110 6, 120 4, 122 10 C 124 22, 119 38, 124 54 Z"
        fill="url(#r-stalk)"/>
  <path d="M 126 54 C 134 42, 132 26, 138 16 C 142 10, 134 6, 132 12 C 128 26, 128 40, 122 56"
        fill="#5C3E18" opacity="0.95"/>
  <path d="M 114 56 C 106 46, 104 32, 100 22 C 96 16, 102 12, 104 18 C 108 30, 112 42, 118 56"
        fill="#4B3214" opacity="0.9"/>

  <!-- neck shadow -->
  <path d="M 105 56 Q 120 66 135 56 Q 120 72 105 56 Z" fill="#000" opacity="0.28"/>
</svg>
