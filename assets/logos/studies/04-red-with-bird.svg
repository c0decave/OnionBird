<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" role="img" aria-label="OnionBird — realistic red onion + thunderbird">
  <title>OnionBird — Red Onion with Thunderbird</title>
  <defs>
    <radialGradient id="rb-bulb" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#E6B4D9"/>
      <stop offset="22%" stop-color="#9B58A8"/>
      <stop offset="55%" stop-color="#5C2A6E"/>
      <stop offset="100%" stop-color="#26102E"/>
    </radialGradient>
    <linearGradient id="rb-stalk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2F1A0B"/>
      <stop offset="100%" stop-color="#7E5824"/>
    </linearGradient>
  </defs>

  <ellipse cx="160" cy="278" rx="92" ry="7" fill="#000" opacity="0.30"/>

  <!-- roots -->
  <g stroke="#3E2010" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M 132 268 Q 124 290, 116 308"/>
    <path d="M 146 272 Q 142 294, 138 314"/>
    <path d="M 160 274 Q 160 298, 160 318"/>
    <path d="M 174 272 Q 178 294, 184 312"/>
    <path d="M 188 268 Q 198 290, 208 304"/>
    <path d="M 122 262 Q 108 278, 96 290"/>
    <path d="M 198 262 Q 212 278, 224 292"/>
  </g>

  <!-- bulb body -->
  <path d="M 64 165
           C 64 96, 108 70, 160 64
           C 212 70, 256 96, 256 165
           C 256 242, 218 274, 160 274
           C 102 274, 64 242, 64 165 Z"
        fill="url(#rb-bulb)"/>

  <!-- skin stripes -->
  <g fill="none" stroke="#1E0A28" stroke-width="1.1" stroke-linecap="round" opacity="0.55">
    <path d="M 160 66 C 122 84, 86 122, 78 168 C 86 232, 124 268, 158 272"/>
    <path d="M 160 66 C 138 88, 110 126, 100 172 C 108 240, 138 270, 162 272"/>
    <path d="M 160 66 C 175 92, 178 130, 178 178 C 175 240, 165 270, 160 272"/>
    <path d="M 160 66 C 190 88, 218 124, 230 170 C 222 238, 192 270, 164 272"/>
    <path d="M 160 66 C 200 84, 232 118, 244 166 C 234 234, 200 270, 166 272"/>
  </g>

  <!-- specular highlight -->
  <ellipse cx="108" cy="138" rx="24" ry="50" fill="#F2D5EA" opacity="0.40" transform="rotate(-14 108 138)"/>
  <ellipse cx="96" cy="180" rx="7" ry="16" fill="#FFFFFF" opacity="0.55"/>

  <!-- dry stalk -->
  <path d="M 158 66 C 154 50, 158 32, 154 18 C 150 10, 160 8, 162 14 C 164 28, 159 46, 164 64 Z"
        fill="url(#rb-stalk)"/>
  <path d="M 166 64 C 174 50, 172 34, 178 22 C 182 16, 174 12, 172 18 C 168 32, 168 48, 162 66"
        fill="#5C3E18" opacity="0.95"/>
  <path d="M 154 66 C 146 54, 144 40, 140 30 C 136 24, 142 20, 144 26 C 148 38, 152 50, 158 66"
        fill="#4B3214" opacity="0.9"/>
  <path d="M 145 66 Q 160 78 175 66 Q 160 82 145 66 Z" fill="#000" opacity="0.30"/>

  <!-- THUNDERBIRD perched/embraced on the bulb -->
  <!-- wing sweep curving over the right shoulder of the onion -->
  <g>
    <path d="M 160 102
             C 220 100, 256 130, 252 180
             C 232 170, 210 160, 188 150
             C 210 162, 224 180, 230 200
             C 200 180, 178 160, 162 140 Z"
          fill="#E66100"/>
    <path d="M 160 102
             C 220 100, 256 130, 252 180"
          fill="none" stroke="#7A2E00" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- inner wing highlight -->
    <path d="M 180 120 C 210 122, 232 140, 240 168" fill="none" stroke="#F9A11B" stroke-width="2"/>

    <!-- bird head emerging on left shoulder -->
    <path d="M 160 102
             C 140 100, 122 108, 118 124
             C 124 134, 144 138, 162 134
             C 168 122, 168 110, 160 102 Z"
          fill="#E66100"/>
    <!-- beak -->
    <path d="M 118 124 L 96 119 L 100 134 Z" fill="#F9A11B" stroke="#7A2E00" stroke-width="1"/>
    <!-- eye -->
    <circle cx="138" cy="118" r="3.2" fill="#FFF7EE"/>
    <circle cx="139" cy="118.5" r="1.6" fill="#1A1024"/>
    <!-- small crest -->
    <path d="M 152 100 L 148 88 L 156 96 L 160 84 L 164 96 Z" fill="#E66100" stroke="#7A2E00" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="160" y="332" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="38" fill="#2B1640">OnionBird</text>
</svg>
