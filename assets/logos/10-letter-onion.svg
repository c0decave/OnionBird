<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="OnionBird — letter-onion">
  <title>OnionBird — Onion Envelope with Wing</title>
  <!-- envelope back -->
  <rect x="60" y="105" width="200" height="135" rx="6" fill="#4A2D67"/>
  <!-- envelope onion-layer "stripes" on flap area -->
  <g fill="none" stroke="#9C6BB8" stroke-width="3">
    <path d="M 60 110 L 160 185 L 260 110"/>
    <path d="M 60 130 L 160 200 L 260 130"/>
    <path d="M 60 150 L 160 215 L 260 150"/>
  </g>
  <!-- envelope flap -->
  <path d="M 60 105 L 160 180 L 260 105 Z" fill="#2B1640"/>
  <!-- onion seal/wax in center -->
  <g transform="translate(160 195)">
    <circle r="34" fill="#7D4698" stroke="#2B1640" stroke-width="3"/>
    <circle r="24" fill="none" stroke="#C49BD8" stroke-width="2"/>
    <circle r="14" fill="#E66100"/>
    <!-- sprout -->
    <path d="M 0 -34 Q -4 -44 0 -50 Q 4 -44 0 -34 Z" fill="#2B1640"/>
  </g>
  <!-- thunderbird wing arcing across envelope -->
  <path d="M 50 240 Q 130 280 280 200" fill="none" stroke="#E66100" stroke-width="8" stroke-linecap="round"/>
  <path d="M 280 200 L 300 188 L 296 218 Z" fill="#E66100"/>
  <path d="M 50 240 L 32 232 L 36 256 Z" fill="#F9A11B"/>
  <!-- wordmark -->
  <text x="160" y="305" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" fill="#2B1640">OnionBird</text>
  <text x="160" y="331" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#7D4698" letter-spacing="6">TOR · THUNDERBIRD</text>
</svg>
