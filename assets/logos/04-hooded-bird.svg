<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="OnionBird — hooded thunderbird">
  <title>OnionBird — Hooded Thunderbird</title>
  <!-- bird body -->
  <ellipse cx="170" cy="200" rx="88" ry="64" fill="#E66100"/>
  <ellipse cx="170" cy="200" rx="88" ry="64" fill="none" stroke="#7A2E00" stroke-width="3"/>
  <!-- wing fold -->
  <path d="M 110 195 Q 160 160 230 200 Q 200 220 150 220 Z" fill="#7A2E00" opacity="0.45"/>
  <!-- tail -->
  <path d="M 250 220 L 290 240 L 270 200 L 290 180 Z" fill="#E66100" stroke="#7A2E00" stroke-width="3" stroke-linejoin="round"/>
  <!-- beak -->
  <path d="M 90 200 L 60 190 L 60 210 Z" fill="#F9A11B" stroke="#7A2E00" stroke-width="2"/>
  <!-- hood (onion) over head -->
  <path d="M 80 175 Q 80 120 145 110 Q 170 165 145 195 Q 110 200 80 175 Z" fill="#4A2D67"/>
  <path d="M 100 165 Q 105 130 145 125" fill="none" stroke="#9C6BB8" stroke-width="3"/>
  <path d="M 95 180 Q 102 145 145 140" fill="none" stroke="#7D4698" stroke-width="3"/>
  <!-- onion tip on hood -->
  <path d="M 122 110 Q 116 96 124 86 Q 130 100 122 110 Z" fill="#4A2D67"/>
  <!-- eye glint inside hood -->
  <circle cx="115" cy="175" r="3.5" fill="#F9A11B"/>
  <!-- wordmark -->
  <text x="160" y="320" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" fill="#2B1640">OnionBird</text>
  <text x="160" y="346" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#7D4698" letter-spacing="6">TOR · THUNDERBIRD</text>
</svg>
