<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="OnionBird — onion-eye">
  <title>OnionBird — Onion Eye of the Thunderbird</title>
  <!-- bird head (large) -->
  <path d="M 70 200 Q 70 80 200 70 Q 285 110 285 180 Q 285 240 200 250 Q 110 245 70 200 Z" fill="#E66100"/>
  <path d="M 70 200 Q 70 80 200 70 Q 285 110 285 180 Q 285 240 200 250 Q 110 245 70 200 Z" fill="none" stroke="#7A2E00" stroke-width="4"/>
  <!-- crest feathers -->
  <path d="M 130 70 L 120 30 L 145 60 L 155 25 L 165 60 L 185 30 L 180 65 Z" fill="#E66100" stroke="#7A2E00" stroke-width="3" stroke-linejoin="round"/>
  <!-- beak -->
  <path d="M 60 200 L 10 185 L 18 215 Z" fill="#F9A11B" stroke="#7A2E00" stroke-width="3" stroke-linejoin="round"/>
  <!-- onion as eye -->
  <g transform="translate(195 165)">
    <circle r="48" fill="#FFF7EE" stroke="#7A2E00" stroke-width="3"/>
    <circle r="38" fill="#7D4698"/>
    <circle r="28" fill="none" stroke="#C49BD8" stroke-width="3"/>
    <circle r="18" fill="#4A2D67"/>
    <circle r="8" fill="#F9A11B"/>
    <!-- onion sprout -->
    <path d="M 0 -48 Q -4 -60 0 -68 Q 4 -60 0 -48 Z" fill="#4A2D67"/>
  </g>
  <!-- wordmark -->
  <text x="160" y="320" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" fill="#2B1640">OnionBird</text>
  <text x="160" y="346" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#7D4698" letter-spacing="6">TOR · THUNDERBIRD</text>
</svg>
