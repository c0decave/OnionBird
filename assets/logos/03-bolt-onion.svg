<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="OnionBird — bolt-onion">
  <title>OnionBird — Lightning becomes Onion</title>
  <!-- background plate (purple) -->
  <circle cx="160" cy="160" r="120" fill="#2B1640"/>
  <!-- onion layers -->
  <g fill="none" stroke="#7D4698" stroke-width="3">
    <circle cx="160" cy="160" r="100"/>
    <circle cx="160" cy="160" r="80"/>
    <circle cx="160" cy="160" r="60"/>
    <circle cx="160" cy="160" r="40"/>
  </g>
  <!-- lightning bolt (yellow → orange) cutting through onion -->
  <path d="M 178 60 L 120 165 L 158 165 L 132 260 L 220 140 L 178 140 L 208 60 Z"
        fill="#F9A11B" stroke="#E66100" stroke-width="3" stroke-linejoin="round"/>
  <!-- top stem of onion -->
  <path d="M 160 40 Q 150 25 160 10 Q 170 25 160 40 Z" fill="#7D4698"/>
  <!-- wordmark -->
  <text x="160" y="320" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" fill="#2B1640">OnionBird</text>
  <text x="160" y="346" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#7D4698" letter-spacing="6">TOR · THUNDERBIRD</text>
</svg>
