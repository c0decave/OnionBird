<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 380" role="img" aria-label="OnionBird — phoenix-onion">
  <title>OnionBird — Phoenix rising from Onion</title>
  <!-- onion base -->
  <g transform="translate(160 230)">
    <path d="M -90 -10 Q -90 -70 0 -80 Q 90 -70 90 -10 Q 90 60 0 60 Q -90 60 -90 -10 Z" fill="#4A2D67"/>
    <path d="M -70 -20 Q -70 -60 0 -68" fill="none" stroke="#9C6BB8" stroke-width="3"/>
    <path d="M -50 -25 Q -50 -55 0 -60" fill="none" stroke="#C49BD8" stroke-width="3"/>
    <path d="M -30 -28 Q -30 -50 0 -54" fill="none" stroke="#E1C3EE" stroke-width="3"/>
  </g>
  <!-- phoenix rising (flame-like wings + body) -->
  <g transform="translate(160 150)">
    <!-- left wing flame -->
    <path d="M 0 30 Q -60 0 -90 -50 Q -50 -20 -30 -10 Q -50 -50 -40 -90 Q -20 -50 -10 -30 Q -15 -70 0 -90 Z"
          fill="#E66100"/>
    <!-- right wing flame -->
    <path d="M 0 30 Q 60 0 90 -50 Q 50 -20 30 -10 Q 50 -50 40 -90 Q 20 -50 10 -30 Q 15 -70 0 -90 Z"
          fill="#F9A11B"/>
    <!-- body -->
    <ellipse cx="0" cy="10" rx="14" ry="28" fill="#E66100"/>
    <!-- head -->
    <circle cx="0" cy="-22" r="10" fill="#E66100"/>
    <!-- beak -->
    <path d="M 8 -22 L 22 -18 L 14 -14 Z" fill="#F9A11B"/>
    <!-- eye -->
    <circle cx="-2" cy="-24" r="2" fill="#2B1640"/>
  </g>
  <!-- wordmark -->
  <text x="160" y="335" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" fill="#2B1640">OnionBird</text>
  <text x="160" y="361" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="12" fill="#7D4698" letter-spacing="6">TOR · THUNDERBIRD</text>
</svg>
